name: Deploy frontend to Vercel

# We didn't connect the Vercel project to GitHub directly (the Vercel
# account is missing a GitHub Login Connection — fixable from the UI but
# not from CLI). Instead, this workflow calls the Vercel CLI with a
# scoped token so push-to-main still gets an automatic production deploy.
on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - 'vercel.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

# One in-flight deploy per branch. Newer pushes cancel older queued runs
# so two production deploys don't race.
concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: vercel build + deploy --prod
    runs-on: ubuntu-latest

    # VERCEL_ORG_ID / VERCEL_PROJECT_ID are the same IDs that live in
    # .vercel/project.json locally (gitignored). They're not secret per
    # se, but storing them as secrets keeps the workflow file free of
    # account-specific values — anyone forking the repo can point this
    # at their own Vercel project just by changing the secrets.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        # Pin to a known-working major. `latest` would work too, but
        # pinning catches breaking-change surprises early instead of in
        # the middle of a demo.
        run: npm install --global vercel@54

      - name: Link project (writes .vercel/project.json from secrets)
        # `vercel pull` resolves VERCEL_ORG_ID + VERCEL_PROJECT_ID into a
        # local link config so the next `deploy` step knows what project
        # to target without prompting.
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        # Server-side build (no --prebuilt). The Vercel build container
        # picks up project env vars (VITE_API_BASE_URL etc.) and injects
        # them into the Vite build automatically — that's the path that
        # works end-to-end. Running `vercel build` on the GH runner first
        # is faster on paper but the env injection into the Vite subproc
        # is flaky from a monorepo subdir; trading the few extra seconds
        # for reliability.
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
